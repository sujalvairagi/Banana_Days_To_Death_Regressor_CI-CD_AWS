name: Banana Predictor CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run lint check
        run: |
          pip install flake8
          flake8 src/ --max-line-length=120 --ignore=E501,W503,E402

      - name: Verify package imports
        run: |
          python -c "from bananaPredictor import logger; logger.info('Package import OK')"
          python -c "from bananaPredictor.config.configuration import ConfigurationManager"
          python -c "from bananaPredictor.entity.config_entity import DataIngestionConfig"

  docker-build:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t banana-predictor:latest .

      # Uncomment and configure for your cloud provider:
