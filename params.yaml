# Data Augmentation
AUGMENTATION: True
AUGMENTATION_ROTATION: 15
AUGMENTATION_BRIGHTNESS: 0.2
AUGMENTATION_ZOOM: 0.1
AUGMENTATION_HORIZONTAL_FLIP: True

# Model Architecture
ARCHITECTURE: EfficientNetB0
IMAGE_SIZE: [224, 224, 3]
INCLUDE_TOP: False
WEIGHTS: imagenet

# Regression Head
HEAD_UNITS: [512, 256, 128]
DROPOUT_RATE: 0.3
ACTIVATION: relu
FINAL_ACTIVATION: linear

# Training - Phase 1 (Head Only)
PHASE_1_EPOCHS: 5
PHASE_1_LR: 0.001
PHASE_1_FREEZE_BACKBONE: True

# Training - Phase 2 (Partial Unfreeze)
PHASE_2_EPOCHS: 10
PHASE_2_LR: 0.0001
PHASE_2_UNFREEZE_LAYERS: 20

# Training - Phase 3 (Full Fine-tune)
PHASE_3_EPOCHS: 30
PHASE_3_LR: 0.00001
PHASE_3_EARLY_STOPPING_PATIENCE: 5

# General Training
BATCH_SIZE: 16
OPTIMIZER: adam
LOSS_FUNCTION: combined
HUBER_DELTA: 1.0
ORDINAL_WEIGHT: 0.3

# Metrics
METRICS:
  - mae
  - mse

# Callbacks
TENSORBOARD: True
MODEL_CHECKPOINT: True
EARLY_STOPPING: True
REDUCE_LR_ON_PLATEAU: True
